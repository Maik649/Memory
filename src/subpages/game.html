<!DOCTYPE html>
<html lang="de" data-theme="Code vibes theme">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Memory Game</title>
    </head>

    <body class="game-page">
        <main class="game-layout">
            <section class="game-shell">
                <header class="game-header">
                    <section class="game-scoreboard" aria-label="Scoreboard">
                        <article class="game-score game-score--blue" aria-label="Blue score">
                            <img data-score-icon="Blue" src="/img/label_blue.svg" alt="Blue marker">
                            <span class="score-label">Blue:</span>
                            <strong data-score="Blue">0</strong>
                        </article>
                        <article class="game-score game-score--orange" aria-label="Orange score">
                            <img data-score-icon="Orange" src="/img/label2.svg" alt="Orange marker">
                            <span class="score-label">Orange:</span>
                            <strong data-score="Orange">0</strong>
                        </article>
                    </section>

                    <section class="game-current-player" aria-label="Current player">
                        <span>Current player:</span>
                        <img data-current-player-icon src="/img/label_blue.svg" alt="Blue player icon">
                        <strong data-current-player-name>Blue</strong>
                    </section>

                    <nav class="button-content" aria-label="Game actions">
                        <div class="exit-btn">
                            <span class="exit-btn__icon" aria-hidden="true"></span>
                            <a href="./settings.html?fromGame=1" class="button">Exit game</a>
                        </div>
                    </nav>
                </header>

                <section class="game-status" data-game-status>
                    Finde alle Paare.
                </section>

                <section class="memory-content">
                    <section class="game-grid" data-game-grid aria-label="Memory board">

                    </section>
                </section>

            </section>
        </main>

        <section class="gameover-intro" data-gameover-intro hidden aria-live="polite">
            <h1 class="gameover-intro__title">Game over</h1>
            <p class="gameover-intro__subtitle">Final score</p>
            <section class="gameover-intro__scores" aria-label="Final score overview">
                <article class="gameover-intro__score gameover-intro__score--blue" aria-label="Blue final score">
                    <img data-gameover-score-icon="Blue" src="/img/label_blue.svg" alt="Blue">
                    <span>Blue</span>
                    <strong data-gameover-score="Blue">0</strong>
                </article>
                <article class="gameover-intro__score gameover-intro__score--orange" aria-label="Orange final score">
                    <img data-gameover-score-icon="Orange" src="/img/label2.svg" alt="Orange">
                    <span>Orange</span>
                    <strong data-gameover-score="Orange">0</strong>
                </article>
            </section>
        </section>

        <aside class="winner-overlay" data-game-over hidden aria-live="polite" aria-label="Winner overlay">
            <div class="confetti-container" data-confetti></div>
            <img class="winner-confetti-bg" src="/img/confetti.png" alt="" aria-hidden="true">
            <article class="winner-card">
                <p class="winner-subtitle" data-winner-subtitle>The winner is</p>
                <img class="winner-icon" data-winner-icon src="/img/label_blue.svg" alt="Winner icon">
                <h1 class="winner-name" data-winner-name>BLUE PLAYER</h1>
                <img class="winner-pawn" data-winner-pawn src="/img/player_blue.png" alt="Winner pawn">
                <img class="winner-draw-icon" data-winner-draw-icon src="/img/chess-pawn.svg" alt="" aria-hidden="true" hidden>
            </article>
        </aside>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
