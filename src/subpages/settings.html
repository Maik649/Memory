<!DOCTYPE html>
<html lang="en" data-theme="Code vibes theme">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Settings</title>
    </head>

    <body>
        <main>
            <h1 class="setting-h1">Settings</h1>
            <img src="../../public/img/Line 3.svg" alt="">

            <section class="settings-content">
                <div class="sidebar">

                    <div class="sub-headline-content">
                        <img class="headline-icon" src="../../public/img/palette.svg" alt="">
                        <p class="headline">Game Themes</p>
                    </div>
                    <div class="input-content">
                        <div class="input-container">
                            <input type="radio" name="theme-radio-btn" id="theme-radio-btn-1" value="Code vibes theme">
                            <label for="theme-radio-btn-1">Code vibes theme</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">   
                        </div>
                        <div class="input-container">
                            <input type="radio" name="theme-radio-btn" id="theme-radio-btn-2" value="Gaming theme">
                            <label for="theme-radio-btn-2">Gaming theme</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>
                        <div class="input-container">
                            <input type="radio" name="theme-radio-btn" id="theme-radio-btn-3" value="DA Projects theme">
                            <label for="theme-radio-btn-3">DA Projects theme</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>
                        <div class="input-container">
                            <input type="radio" name="theme-radio-btn" id="theme-radio-btn-4" value="Foods theme">
                            <label for="theme-radio-btn-4">Foods theme</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>
                    </div>

                    <div class="sub-headline-content">
                        <img class="headline-icon" src="../../public/img/chess_pawn.svg" alt="">
                        <p class="headline">Choose player</p>
                    </div>
                    <div class="input-content">
                        <div class="input-container">
                            <input type="radio" name="player-radio-btn" id="player-radio-btn-1" value="Blue">
                            <label for="player-radio-btn-1">Blue</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>
                        <div class="input-container">
                            <input type="radio" name="player-radio-btn" id="player-radio-btn-2" value="Orange">
                            <label for="player-radio-btn-2">Orange</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>

                    </div>
                    <div class="sub-headline-content">
                        <img class="headline-icon" src="../../public/img/style.svg" alt="">
                        <p class="headline">Board size</p>
                    </div>
                    <div class="input-content">
                        <div class="input-container">
                            <input type="radio" name="board-size-radio-btn" id="board-size-radio-btn-1" value="16">
                            <label for="board-size-radio-btn-1">16</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>
                        <div class="input-container">
                            <input type="radio" name="board-size-radio-btn" id="board-size-radio-btn-2" value="24">
                            <label for="board-size-radio-btn-2">24</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>
                        <div class="input-container">
                            <input type="radio" name="board-size-radio-btn" id="board-size-radio-btn-3" value="34">
                            <label for="board-size-radio-btn-3">34</label>
                            <img class="label-icon" src="../../public/img/Line kurz.svg" alt="">
                        </div>
                    </div>
                </div>
                <div class="conten-right">

                
                <div class="theme-section">
                    <header>
                        <div class="player-content">
                            <img src="../../public/img/label_blue.svg" alt="">
                            <p class="--label-blue">Blue</p>
                            <p class="--label-blue">0</p>
                            <img src="../../public/img/label2.svg" alt="">
                            <p class="--label-orange">Orange</p>
                            <p class="--label-orange">0</p>
                        </div>
                        <div class="current-player">
                            <p>Current Player: </p> <img src="../../public/img/label.svg" alt="">
                        </div>
                        <div class="button-content">
                            <div class="exit-btn">
                                <img src="../../public/img/move_item.svg" alt="">
                                <a href="#" class="button">Exit game</a>
                            </div>
                        </div>
                    </header>
                    <div id="theme-preview" class="theme-preview">
                        <img class="preview-card preview-card--2" src="" alt="">
                        <img class="preview-card preview-card--1" src="" alt="">
                    </div>
                </div>
                    <nav class="settings-nav">
                        <ul class="settings-nav__list">
                            <li class="settings-nav__item" data-settings-nav="theme">
                             <span class="settings-nav__value">Code vibes theme</span>
                            </li>
                            <li class="settings-nav__divider"></li>
                            <li class="settings-nav__item" data-settings-nav="player">
                               <span class="settings-nav__value">Blue</span>
                            </li>
                            <li class="settings-nav__divider"></li>
                            <li class="settings-nav__item" data-settings-nav="board-size">
                             <span class="settings-nav__value">16</span>
                            </li>
                        </ul>
                        <div class="setting-screen-buttons">
                            <a href="./game.html" class="button--settings">Play</a>
                            <img class="button-icons --controller" src="../../public/img/smart_display.png" alt="">
                        </div>
                    </nav>
                    </div>
                </section>
            </main>

        <script type="module" src="/src/main.ts"></script>
    </body>

</html>
