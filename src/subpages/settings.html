<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Settings</title>
    </head>

    <body>
        <main>
            <h1 class="setting-h1">Settings</h1>
            <img src="../../public/img/Line 3.svg" alt="">

            <section class="settings-content">
                <div class="sidebar">

                    <div class="sub-headline-content">
                        <img class="headline-icon" src="../../public/img/palette.svg" alt="">
                        <p class="headline">Game Themes</p>
                    </div>
                    <div class="input-content">
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-1" value=""><label for="radio-btn-1">Code
                                vibes theme</label>
                        </div>
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-2" value=""><label
                                for="radio-btn-2">Gaming theme</label>
                        </div>
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-3" value=""><label for="radio-btn-3">DA
                                Projects theme</label>
                        </div>
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-4" value=""><label
                                for="radio-btn-4">Foods theme</label>
                        </div>
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-5" value=""><label
                                for="radio-btn-5">Nature theme</label>
                        </div>
                    </div>



                    <div class="sub-headline-content">
                        <img class="headline-icon" src="../../public/img/chess_pawn.svg" alt="">
                        <p class="headline">Choose player</p>
                    </div>
                    <div class="input-content">
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-1" value=""><label
                                for="radio-btn-1">Blue</label>
                        </div>
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-2" value=""><label
                                for="radio-btn-2">Orange</label>
                        </div>

                    </div>
                    <div class="sub-headline-content">
                        <img class="headline-icon" src="../../public/img/style.svg" alt="">
                        <p class="headline">Board size</p>
                    </div>
                    <div class="input-content">
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-1" value=""><label
                                for="radio-btn-1">16</label>
                        </div>
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-2" value=""><label
                                for="radio-btn-2">24</label>
                        </div>
                        <div class="input-container">
                            <input type="radio" name="radio-btn" id="radio-btn-3" value=""><label
                                for="radio-btn-3">34</label>
                        </div>
                    </div>
                </div>

                <div class="theme-section">
                    <header>
                        <div class="player-content">
                            <img src="../../public/img/label_blue.svg" alt="">
                            <p class="--label-blue">0</p>
                            <img src="../../public/img/label2.svg" alt="">
                            <p class="--label-orange">0</p>
                        </div>
                        <div class="current-player">
                            <p>Current Player: </p> <img src="../../public/img/label.svg" alt="">
                        </div>
                        <div class="exit-btn">
                            <img src="../../public/img/move_item.svg" alt="">
                            <a href="#" class="button">Exit</a>
                        </div>
                    </header>
                    <div class="theme-preview">
                        <img src="../../public/img/preview.png" alt="">
                    </div>
                </div>
            </section>
        </main>
        <script type="module" src="/src/main.ts"></script>
    </body>

</html>
